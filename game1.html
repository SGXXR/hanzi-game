        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playRichNote(melodyFreq, chordFreq, time) {
            if (!audioCtx || !isMusicPlaying) return;
            const now = time || audioCtx.currentTime;
            const duration = 0.32;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = melodyFreq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.32, now + 0.008);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.start(now);
            osc.stop(now + duration);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.value = melodyFreq * 2;
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.linearRampToValueAtTime(0.14, now + 0.008);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);
            osc2.start(now);
            osc2.stop(now + duration * 0.7);
            
            const third = chordFreq * Math.pow(2, 4/12);
            const fifth = chordFreq * Math.pow(2, 7/12);
            [chordFreq, third, fifth].forEach((f, idx) => {
                const oscC = audioCtx.createOscillator();
                const gainC = audioCtx.createGain();
                oscC.type = 'sine';
                oscC.frequency.value = f;
                oscC.connect(gainC);
                gainC.connect(audioCtx.destination);
                const vol = idx === 0 ? 0.1 : 0.07;
                gainC.gain.setValueAtTime(0, now);
                gainC.gain.linearRampToValueAtTime(vol, now + 0.012);
                gainC.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1);
                oscC.start(now);
                oscC.stop(now + duration + 0.1);
            });
            
            const bass = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            bass.type = 'sine';
            bass.frequency.value = chordFreq / 2.2;
            bass.connect(bassGain);
            bassGain.connect(audioCtx.destination);
            bassGain.gain.setValueAtTime(0, now);
            bassGain.gain.linearRampToValueAtTime(0.16, now + 0.01);
            bassGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            bass.start(now);
            bass.stop(now + duration);
            
            if (currentSongIndex % 2 === 1) {
                const bufferSize = 256;
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const drumGain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200;
                filter.Q.value = 2;
                noise.connect(filter);
                filter.connect(drumGain);
                drumGain.connect(audioCtx.destination);
                drumGain.gain.setValueAtTime(0.25, now);
                drumGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                noise.start(now);
                noise.stop(now + 0.1);
            }
        }
        
        let currentMelodyList = [];
        let currentChordList = [];
        let currentSongLength = 0;
        
        function loadLevelSong(level) {
            const song = levelCompleteSongs[level] || levelCompleteSongs[1];
            currentMelodyList = [...song.melody];
            currentChordList = [...song.chords];
            currentSongLength = currentMelodyList.length;
            currentSongName = song.name;
            musicNameDisplay.innerHTML = `🎵 第${level}关 · ${currentSongName}`;
        }
        
        function playNextNote() {
            if (!isMusicPlaying || isGamePaused) return;
            if (!audioCtx || audioCtx.state !== 'running') return;
            if (currentMelodyList.length === 0) return;
            
            const melodyFreq = currentMelodyList[currentSongIndex % currentMelodyList.length];
            const chordFreq = currentChordList[currentSongIndex % currentChordList.length];
            playRichNote(melodyFreq, chordFreq, audioCtx.currentTime);
            currentSongIndex++;
            
            if (currentSongIndex >= currentSongLength) {
                currentSongIndex = 0;
            }
        }
        
        function startMusic() {
            initAudioContext();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => startMusicLoop()).catch(() => {});
            } else {
                startMusicLoop();
            }
        }
        
        function startMusicLoop() {
            if (musicTimer) clearInterval(musicTimer);
            if (isMusicPlaying) return;
            isMusicPlaying = true;
            currentSongIndex = 0;
            musicTimer = setInterval(playNextNote, 310);
            musicStatus.innerText = "🎵 完整乐曲播放中";
            musicStatus.style.background = "#4caf50";
            musicBtn.innerHTML = '🔇 关闭音乐';
            musicBtn.style.background = "#F5F5F5";
            if (musicHint) musicHint.style.display = "none";
        }
        
        function stopMusic() {
            isMusicPlaying = false;
            if (musicTimer) clearInterval(musicTimer);
            musicTimer = null;
            musicStatus.innerText = "🔇 音乐已关闭";
            musicStatus.style.background = "#f44336";
            musicBtn.innerHTML = '🎵 播放音乐';
            musicBtn.style.background = "#E1BEE7";
        }
        
        function toggleMusic() {
            initAudioContext();
            if (isMusicPlaying) stopMusic();
            else startMusic();
        }
        
        function switchLevelMusic(level) {
            const wasPlaying = isMusicPlaying;
            if (wasPlaying) stopMusic();
            loadLevelSong(level);
            if (wasPlaying && !isGamePaused) startMusic();
        }
        
        musicBtn.onclick = (e) => { e.stopPropagation(); toggleMusic(); };
        
        function playPopSound() {
            if (!audioCtx) initAudioContext();
            if (audioCtx.state === 'suspended') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1100, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.07);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.45, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
            osc.start(now);
            osc.stop(now + 0.09);
        }

        function playMagicSound() {
            if (!audioCtx) initAudioContext();
            if (audioCtx.state === 'suspended') return;
            const notes = [523, 659, 784, 1047, 1318];
            notes.forEach((freq, idx) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                }, idx * 100);
            });
        }

        function buildLevelMenu() {
            const container = document.getElementById('level-grid-container');
            for(let i = 1; i <= TOTAL_LEVELS; i++) {
                const btn = document.createElement('button');
                const songName = levelCompleteSongs[i]?.name || `第${i}关`;
                btn.innerText = `第${i}关\n${songName.substring(0, 10)}`;
                btn.style.whiteSpace = 'pre-line';
                btn.style.fontSize = '10px';
                btn.className = 'btn-grid';
                btn.onclick = () => initGame(i);
                container.appendChild(btn);
            }
        }
        buildLevelMenu();

        function getLevelConfig(level) {
            const speedMin = Math.max(4.5, 14 - ((level - 1) * 0.6));
            const speedMax = Math.max(6.5, 19 - ((level - 1) * 0.7));
            const spawnRate = Math.max(1200, 3200 - ((level - 1) * 130));
            return { speedMin, speedMax, spawnRate };
        }

        function openMenu() {
            isGamePaused = true;
            if (spawnInterval) clearInterval(spawnInterval);
            menuTitle.innerText = "🎈 第一阶段 · 完整乐曲 🎈";
            resumeBtn.style.display = "block";
            startScreen.style.display = 'flex';
        }

        function resumeGame() {
            startScreen.style.display = 'none';
            isGamePaused = false;
            const config = getLevelConfig(currentLevel);
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(createBubble, config.spawnRate);
        }

        function initGame(level) {
            initAudioContext();
            currentLevel = level;
            switchLevelMusic(currentLevel);
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            score = 0;
            scoreEl.innerText = score;
            startScreen.style.display = 'none';
            document.querySelectorAll('.bubble').forEach(b => b.remove());
            startLevel(currentLevel);
        }

        function startLevel(level) {
            isGamePaused = false;
            levelUpScreen.style.display = 'none';
            levelDisplayEl.innerText = level;
            const config = getLevelConfig(level);
            nextWord();
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(createBubble, config.spawnRate);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance("找一找：" + text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function nextWord() {
            currentTarget = uniqueWords[Math.floor(Math.random() * uniqueWords.length)];
            targetWordEl.innerText = currentTarget;
            speak(currentTarget);
        }

        function createBubble() {
            if (isGamePaused) return;
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            let wordToShow = (Math.random() > 0.55) ? currentTarget : uniqueWords[Math.floor(Math.random() * uniqueWords.length)];
            bubble.innerText = wordToShow;
            if(wordToShow.length >= 4) bubble.style.fontSize = '20px';
            else if (wordToShow.length === 3) bubble.style.fontSize = '24px';
            else if (wordToShow.length === 2) bubble.style.fontSize = '28px';
            else bubble.style.fontSize = '36px';
            const screenWidth = window.innerWidth;
            const minX = 15, maxX = screenWidth - 90 - 15;
            bubble.style.left = Math.floor(Math.random() * (maxX - minX + 1)) + minX + 'px';
            const config = getLevelConfig(currentLevel);
            bubble.style.animationDuration = (Math.random() * (config.speedMax - config.speedMin) + config.speedMin) + 's';
            bubble.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isGamePaused) return;
                if (bubble.innerText === currentTarget) {
                    playPopSound();
                    const rect = bubble.getBoundingClientRect();
                    createSplashes(rect.left + 45, rect.top + 45);
                    bubble.remove();
                    score++;
                    scoreEl.innerText = score;
                    if (Math.random() > 0.5 && 'speechSynthesis' in window) {
                        const cheers = ["太棒啦！", "好厉害！", "继续加油！"];
                        const cheer = new SpeechSynthesisUtterance(cheers[Math.floor(Math.random() * cheers.length)]);
                        cheer.lang = 'zh-CN';
                        window.speechSynthesis.speak(cheer);
                    }
                    checkLevelUp();
                } else {
                    bubble.classList.add('wrong');
                    setTimeout(() => bubble.classList.remove('wrong'), 300);
                }
            });
            bubble.addEventListener('animationend', () => bubble.remove());
            document.body.appendChild(bubble);
        }

        function checkLevelUp() {
            if (score > 0 && score % POINTS_TO_PASS === 0) {
                isGamePaused = true;
                clearInterval(spawnInterval);
                document.querySelectorAll('.bubble').forEach(b => b.remove());
                playMagicSound();
                for(let i=0; i<10; i++) {
                    setTimeout(() => createSplashes(window.innerWidth/2 + (Math.random()-0.5)*200, window.innerHeight/2 + (Math.random()-0.5)*200, 10), i*100);
                }
                if ('speechSynthesis' in window) {
                    const passSpeech = new SpeechSynthesisUtterance("恭喜过关！进入下一关！");
                    passSpeech.lang = 'zh-CN';
                    window.speechSynthesis.speak(passSpeech);
                }
                setTimeout(() => {
                    document.getElementById('finished-level').innerText = currentLevel;
                    if(currentLevel < TOTAL_LEVELS) {
                        currentLevel++;
                        loadLevelSong(currentLevel);
                    }
                    document.getElementById('next-level-display').innerText = currentLevel;
                    levelUpScreen.style.display = 'flex';
                }, 1300);
            } else {
                setTimeout(nextWord, 600);
            }
        }

        function createSplashes(x, y, count = 8) {
            const symbols = ['💧', '🫧', '✨', '⭐', '🌸'];
            for (let i = 0; i < count; i++) {
                const splash = document.createElement('div');
                splash.innerText = symbols[Math.floor(Math.random()*symbols.length)];
                splash.classList.add('splash');
                splash.style.left = x + 'px';
                splash.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 30;
                splash.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                splash.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                document.body.appendChild(splash);
                setTimeout(() => splash.remove(), 500);
            }
        }
        
        initAudioContext();
        loadLevelSong(1);
        
        window.toggleMusic = toggleMusic;
        window.openMenu = openMenu;
        window.resumeGame = resumeGame;
        window.startLevel = startLevel;
        window.initGame = initGame;
    </script>
</body>
</html>
